<svg viewBox="0 0 1200 560" width="1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pictogram of the jump_processes flow: model parameters go into JumpDiffusion, simulate and simulate_many produce SimResult paths, which feed the jump statistics, combined_plot and the monte_carlo estimate">
    <style>
svg { --panel:#ffffff; --ink:#2a2522; --muted:#7d746c; --line:#e0dad2;
      --blue:#2f6fdb; --blue-soft:#eef3fc; --blue-dark:#2456b0;
      --red:#dc2626; --sim:#57534e;
      --mono:ui-monospace,"Cascadia Code",Consolas,monospace;
      --sans:system-ui,"Segoe UI",sans-serif; }
.blk { fill: var(--blue-soft); stroke: var(--blue); stroke-width: 1.2; }
.mdl { fill: var(--blue-soft); stroke: var(--blue-dark); stroke-width: 1.5; }
.resbox { fill: var(--panel); stroke: var(--sim); stroke-width: 1.3; }
.icon { fill: var(--panel); stroke: var(--line); stroke-width: 1.5; }
.a-call { stroke: var(--blue-dark); stroke-width: 2; fill: none; }
.wig { stroke: var(--blue); stroke-width: 1.6; fill: none; }
.pxb { stroke: var(--blue); stroke-width: 1.5; fill: none; opacity: .75; }
.pxo { stroke: var(--blue-dark); stroke-width: 2; fill: none; }
.pxr { stroke: var(--red); stroke-width: 1.3; stroke-dasharray: 3 3; fill: none; }
.ax { stroke: var(--line); stroke-width: 1.2; fill: none; }
text { font-family: var(--sans); fill: var(--ink); }
.t-btitle { font-family: var(--mono); font-size: 12.5px; font-weight: 650; fill: var(--blue-dark); }
.t-name { font-family: var(--mono); font-size: 11px; }
.t-cls { font-family: var(--mono); font-size: 13px; font-weight: 650; }
.t-sub { font-size: 10.5px; fill: var(--muted); }
.t-call { font-family: var(--mono); font-size: 12px; font-weight: 600; fill: var(--blue-dark); }
.t-dw { font-family: var(--mono); font-size: 10.5px; fill: var(--muted); }
.t-sym { font-family: "STIX Two Math","Cambria Math","Times New Roman",serif; font-style: italic; font-size: 15px; }
.t-sig { font-family: "STIX Two Math","Cambria Math","Times New Roman",serif; font-style: italic; font-size: 11.5px; fill: var(--muted); }
</style>
<rect x="0" y="0" width="1200" height="560" fill="#ffffff"/>
<defs>
      <marker id="ah-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0 0 L10 5 L0 10 z" fill="var(--blue-dark)"/>
      </marker>
    </defs>

    <!-- model parameters -->
    <rect class="blk" x="24" y="168" width="230" height="262" rx="8"/>
    <text class="t-btitle" x="36" y="192">parameters</text>

    <text class="t-sym" x="40" y="226">&#956;</text>
    <text class="t-name" x="90" y="226">Drift</text>
    <text class="t-sig" x="90" y="241">&#956;(x)</text>

    <text class="t-sym" x="40" y="264">&#963;</text>
    <text class="t-name" x="90" y="264">Diffusion</text>
    <text class="t-sig" x="90" y="279">&#963;(x)</text>

    <text class="t-sym" x="40" y="302">h</text>
    <text class="t-name" x="90" y="302">Intensity</text>
    <text class="t-sig" x="90" y="317">h(x)</text>

    <text class="t-sym" x="40" y="340">&#961;</text>
    <text class="t-name" x="90" y="340">JumpType</text>
    <text class="t-sig" x="90" y="355">&#961;(x, y)</text>

    <text class="t-sym" x="40" y="378">Y</text>
    <text class="t-name" x="90" y="378">JumpSizeDistribution</text>
    <text class="t-sig" x="90" y="393">rng &#8594; Y</text>

    <text class="t-sym" x="40" y="418">x<tspan font-size="10.5" dy="3">0</tspan></text>
    <text class="t-name" x="90" y="418">float</text>

    <!-- parameters -> model -->
    <line class="a-call" x1="254" y1="308" x2="356" y2="308" marker-end="url(#ah-o)"/>
    <text class="t-call" x="305" y="294" text-anchor="middle">JumpDiffusion</text>

    <!-- JumpDiffusion -->
    <rect class="mdl" x="360" y="272" width="200" height="72" rx="8"/>
    <text class="t-cls" x="460" y="302" text-anchor="middle">JumpDiffusion</text>
    <text class="t-sub" x="460" y="324" text-anchor="middle">jump diffusion object</text>

    <!-- brownian_motion -> wiggle icon -->
    <line class="a-call" x1="460" y1="272" x2="460" y2="190" marker-end="url(#ah-o)"/>
    <text class="t-call" x="450" y="228" text-anchor="end">brownian_motion</text>
    <text class="t-sub" x="450" y="243" text-anchor="end">generates BM increments</text>
    <rect class="icon" x="381" y="96" width="158" height="90" rx="8"/>
    <text class="t-dw" x="393" y="114">dW</text>
    <polyline class="wig" points="395,150 407,138 417,158 429,132 441,152 453,140 465,162 477,136 489,150 501,128 513,148 525,142"/>

    <!-- simulate -> SimResult -->
    <line class="a-call" x1="560" y1="308" x2="806" y2="308" marker-end="url(#ah-o)"/>
    <text class="t-call" x="683" y="294" text-anchor="middle">simulate</text>
    <text class="t-sub" x="683" y="326" text-anchor="middle">simulates one jump diffusion path</text>

    <!-- SimResult stack -->
    <rect class="resbox" x="826" y="256" width="160" height="72" rx="8" opacity="0.45"/>
    <rect class="resbox" x="818" y="264" width="160" height="72" rx="8" opacity="0.7"/>
    <rect class="resbox" x="810" y="272" width="160" height="72" rx="8"/>
    <text class="t-cls" x="890" y="302" text-anchor="middle">SimResult</text>
    <text class="t-sub" x="890" y="324" text-anchor="middle">one sample path</text>

    <!-- simulate_many curve -->
    <path class="a-call" d="M 462 350 Q 630 462 838 354" marker-end="url(#ah-o)"/>
    <text class="t-call" x="640" y="435" text-anchor="middle">simulate_many</text>
    <text class="t-sub" x="640" y="450" text-anchor="middle">simulates multiple jump diffusion paths</text>

    <!-- combined_plot -> chart icon -->
    <line class="a-call" x1="890" y1="256" x2="890" y2="196" marker-end="url(#ah-o)"/>
    <text class="t-call" x="880" y="224" text-anchor="end">combined_plot</text>
    <text class="t-sub" x="880" y="239" text-anchor="end">plots regular and jump diffusion</text>
    <rect class="icon" x="805" y="88" width="170" height="104" rx="8"/>
    <polyline class="ax" points="819,100 819,178 963,178"/>
    <polyline class="pxb" points="819,168 839,160 859,164 879,150 899,155 919,146 939,150 957,142"/>
    <polyline class="pxo" points="819,166 841,158 863,162 881,152"/>
    <line class="pxr" x1="881" y1="152" x2="881" y2="124"/>
    <polyline class="pxo" points="881,124 903,128 923,118 943,126 957,120"/>
    <circle cx="881" cy="124" r="3" fill="var(--red)"/>

    <!-- SimResult -> jump statistics -->
    <line class="a-call" x1="990" y1="308" x2="1030" y2="308" marker-end="url(#ah-o)"/>
    <rect class="resbox" x="1034" y="203" width="154" height="210" rx="8"/>
    <text class="t-btitle" x="1046" y="227" style="fill:var(--sim)">jump statistics</text>
    <text class="t-name" x="1048" y="256">n_jumps</text>
    <text class="t-name" x="1048" y="278">jump_sizes()</text>
    <text class="t-name" x="1048" y="300">largest_jump()</text>
    <text class="t-name" x="1048" y="322">smallest_jump()</text>
    <text class="t-name" x="1048" y="344">average_jump()</text>
    <text class="t-name" x="1048" y="366">first_jump()</text>
    <text class="t-name" x="1048" y="388">last_jump()</text>

    <!-- monte_carlo -> estimate -->
    <line class="a-call" x1="890" y1="348" x2="890" y2="466" marker-end="url(#ah-o)"/>
    <text class="t-call" x="900" y="400" text-anchor="start">monte_carlo</text>
    <text class="t-sub" x="900" y="415" text-anchor="start">averages f(J&#8348;) over all paths</text>
    <rect class="resbox" x="800" y="470" width="180" height="72" rx="8"/>
    <text class="t-cls" x="890" y="500" text-anchor="middle">estimate &#177; SE</text>
    <text class="t-sub" x="890" y="522" text-anchor="middle">sample mean and standard error</text>
  </svg>
